<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>TechMedixLink Debug</title></head>
<body>
<div id="out" style="font-family:monospace;font-size:13px;padding:20px;white-space:pre-wrap"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>

<script type="module">
const out = document.getElementById('out');
const log = (msg, col) => { 
  const d = document.createElement('div');
  d.style.color = col||'#000';
  d.textContent = msg;
  out.appendChild(d);
};

// Override console.error to catch Vue warnings
const origError = console.error;
console.error = (...args) => {
  log('CONSOLE.ERROR: ' + args.join(' '), 'orange');
  origError(...args);
};
window.onerror = (msg, src, line, col) => {
  log(`WINDOW ERROR: ${msg} at ${src}:${line}:${col}`, 'red');
};

log('Step 1: Loading modules...');
const [S, A, F] = await Promise.all([
  import('./js/state.js'),
  import('./js/actions.js'),
  import('./js/formatters.js'),
]);
log('✓ All modules loaded', 'green');
log(`  state: ${Object.keys(S).length} exports`);
log(`  actions: ${Object.keys(A).length} exports`);

log('\nStep 2: Testing Vue createApp...');
try {
  const { createApp, ref } = Vue;
  const app = createApp({
    setup() {
      log('  setup() running...', 'blue');
      // Spread state — this is what main.js does
      try {
        const spread = {...S};
        log(`  ...S spread OK: ${Object.keys(spread).length} keys`, 'green');
      } catch(e) { log('  ...S spread FAILED: ' + e.message, 'red'); }
      
      try {
        const spread = {...A};
        log(`  ...A spread OK: ${Object.keys(spread).length} keys`, 'green');
      } catch(e) { log('  ...A spread FAILED: ' + e.message, 'red'); }

      return { ...S, ...A };
    },
    template: '<div>TEST OK</div>'
  });
  
  const div = document.createElement('div');
  document.body.appendChild(div);
  app.mount(div);
  log('✓ Vue mounted successfully!', 'green');
} catch(e) {
  log('✗ Vue FAILED: ' + e.message, 'red');
  log('  ' + (e.stack?.split('\n')[1] || ''), 'red');
}

log('\nStep 3: Testing full main.js mount on #app...');
// Check what showOnboarding value is
log('  showOnboarding value: ' + S.showOnboarding?.value);
log('  onboarding_done value: ' + S.onboardingDone?.value);

log('\nDone.');
</script>
</body>
</html>
